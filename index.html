<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>dog-personality-test</title>
</head>

<body>
<!-- TOP -->
    <div id="top-screen" class="screen">
        <img src="dog-images/top1.svg" alt="top装飾画像">
        <h1>あなたをわんこに例えると？</h1>
        <p>7割当たる、3割笑える。<br>
            犬あるある性格診断
        </p>

            <img src="dog-images/top2.svg" alt="犬のシルエット画像">

        <div class="start-btn-wrap">
            <img src="dog-images/startBTN.svg" class="start-btn" alt="スタートボタン">
            <h3 class="start-text">スタートだワンっ！</h3> 
        </div>
    </div>

<!-- question -->
    <div id="question-screen" class="screen">
        <p class="question-count">Q1 / 25</p>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>

        <p class="question-text">
            連絡が来ても、返事は気分次第だ
        </p>

        <div class="answer-btn-wrap">
            <button class="answer-btn" id="yes-btn">
                <img src="dog-images/btnyes.svg" alt="">
                <span class="answer-text">はい</span>
            </button>

            <button class="answer-btn" id="no-btn">
                <img src="dog-images/btnyes.svg" alt="">
                <span class="answer-text">いいえ</span>
            </button>
        </div>

        <img src="dog-images/testdeco.svg" alt="骨の画像" class="question-decoration-img">
    </div>

</div>





















    


<script src="js/main.js"></script>
</body>
</html>
